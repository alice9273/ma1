<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brawl Stars Event</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 15px;
  background:#1e293b;
}
.menu{font-size:22px}
.icon{width:35px;border-radius:50%}

/* TITLE */
.title{padding:15px}
.title h1{font-size:20px;margin:0}

/* HEADER IMAGE */
.header-img{
  margin:0 15px;
  height:180px;
  background:url('header.png') center/cover no-repeat;
  border-radius:15px;
}

/* PRIZE */
.prize{
  padding:20px 15px;
}
.prize h3{color:#facc15;margin:0 0 10px 0;letter-spacing:2px}
.prize .amount{font-size:28px;font-weight:bold}

/* OVERVIEW */
.card{
  margin:0 15px 80px;
  background:#111827;
  border-radius:15px;
  padding:20px;
}
.card h2{margin-top:0}
.row{display:flex;align-items:center;margin:15px 0;color:#cbd5f5}
.row span{margin-left:10px}

/* BOTTOM BAR */
.bottombar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#1e293b;
  display:flex;
  justify-content:space-around;
  align-items:center;
  padding:10px 0;
}
.contribute{
  background:#f59e0b;
  padding:10px 20px;
  border-radius:10px;
  border:3px solid #fde68a;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="menu">☰</div>
  <img src="brawlstars.png" style="height:30px">
  <img src="emote5.png" class="icon">
</div>

<div class="title">
  <h1>⚔️ Brawl Stars Challengers France - Qualifier #1</h1>
</div>

<div class="header-img"></div>

<div class="prize">
  <h3>PRIZE POOL</h3>
  <div class="amount">🏆 $1,144.53</div>
</div>

<div class="card">
  <h2>Overview</h2>
  <div class="row">🌍 <span>EU/Germany-2</span></div>
  <div class="row">📘 <span>Power League</span></div>
  <div class="row">🔀 <span>Single Elim - 3v3</span></div>
  <div class="row">🎟️ <span>Invite</span></div>
</div>

<div class="bottombar">
  <div>Navigation</div>
  <div class="contribute">Contribute</div>
  <div>Activity</div>
</div>

</body>
</html>
