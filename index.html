<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchFund UI</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
button{cursor:pointer}

/* HEADER TOURNOI */
.header{
  padding:20px;
  background:url('header.png') center/cover no-repeat;
}
.header h2{margin:0}
.game-icon{width:40px;vertical-align:middle;margin-right:10px}

/* BUTTON */
.open-btn{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#f59e0b;border:none;padding:12px 25px;border-radius:10px}

/* MODAL */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center}
.modal-content{background:#1e293b;width:95%;max-width:400px;border-radius:10px;padding:20px;max-height:90vh;overflow:auto}
.close{float:right;font-size:20px;cursor:pointer}

.card{background:#0f172a;padding:15px;border-radius:10px;margin:15px 0;text-align:center}
.card img{width:80px}
.price{font-size:28px;margin:10px 0}
.selected{background:#16a34a;padding:8px;border-radius:5px}
.not-selected{background:#374151;padding:8px;border-radius:5px}

.footer-actions{display:flex;justify-content:space-between;margin-top:20px}
.cancel{background:transparent;border:none;color:#aaa}
.pay{background:#2563eb;border:none;padding:10px 20px;color:#fff;border-radius:5px}

.payment{margin-top:20px}
.input{width:100%;padding:10px;margin:5px 0;border:none;border-radius:5px}
.pay-btn{width:100%;background:#0ea5e9;padding:15px;border:none;border-radius:25px;margin-top:10px}
</style>
</head>
<body>

<div class="header">
<h2><img src="brawlstars.png" class="game-icon"> Brawl Stars Challengers</h2>
</div>

<button class="open-btn" onclick="openModal()">Contribute</button>

<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">✖</span>
<h3>Contribution</h3>

<div class="card" onclick="toggle(0)">
<img src="emote5.png">
<h4>Spike Pin</h4>
<div class="price">$5.00</div>
<div id="sel0" class="selected">Selected</div>
</div>

<div class="card" onclick="toggle(1)">
<img src="emote2.png">
<h4>Mandy Pin</h4>
<div class="price">$2.50</div>
<div id="sel1" class="selected">Selected</div>
</div>

<div class="footer-actions">
<button class="cancel" onclick="closeModal()">Cancel</button>
<button class="pay" onclick="showPayment()">Contribute</button>
</div>

<div class="payment" id="payment" style="display:none">
<h4>Paiement</h4>
<input class="input" placeholder="Numéro de carte">
<input class="input" placeholder="Date expiration">
<input class="input" placeholder="CVV">
<input class="input" placeholder="Nom">
<input class="input" placeholder="Adresse">
<input class="input" placeholder="Email">
<button class="pay-btn" id="totalBtn">Payer $7.50</button>
</div>

</div>
</div>

<script>
let selected=[true,true];
let prices=[5,2.5];

function toggle(i){
  selected[i]=!selected[i];
  const el=document.getElementById('sel'+i);
  if(selected[i]){
    el.className='selected';
    el.innerText='Selected';
  }else{
    el.className='not-selected';
    el.innerText='Add';
  }
  updateTotal();
}

function updateTotal(){
  let total=0;
  selected.forEach((s,i)=>{if(s) total+=prices[i]});
  document.getElementById('totalBtn').innerText='Payer $'+total.toFixed(2);
}

function openModal(){document.getElementById('modal').style.display='flex'}
function closeModal(){document.getElementById('modal').style.display='none'}
function showPayment(){document.getElementById('payment').style.display='block'}
</script>

</body>
</html>
